services:
  api:
    build: ./backend
    environment:
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-*}
    ports:
      - "5000:5000"
  web:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    depends_on:
      - api
    ports:
      - "3000:3000"